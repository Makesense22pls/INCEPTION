server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name mafourni.42.fr;

    ssl_certificate /etc/nginx/ssl/mafourni.crt;
    ssl_certificate_key /etc/nginx/ssl/mafourni.key;

    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/html;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$args; # Optimisé pour les permaliens WP
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass wordpress:9000; # Nom du service dans docker-compose
        fastcgi_index index.php;
        include fastcgi_params;
        # Ligne cruciale pour que PHP sache quel fichier exécuter
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}